name: Esegui VeChain Bot

# Permette di far partire il bot manualmente dalla scheda "Actions"
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Scarica il codice dal tuo repository
      - name: Checkout del codice
        uses: actions/checkout@v4

      # 2. Configura l'ambiente Python
      - name: Configura Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Ottimizza i tempi di installazione caricando la cache

      # 3. Installa le librerie necessarie (requests e thor-requests)
      - name: Installa le dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests thor-requests

      # 4. Esecuzione del Bot
      # Qui iniettiamo la chiave privata in modo sicuro tramite variabile d'ambiente
      - name: Esegui il Relayer
        env:
          
        run: python bot.py
