name: VeChain Sniper Batch-Mode

on:
  schedule:
    # Parte alle 07:15 Italiane ogni lunedì
    - cron: '15 6 * * 1'
  workflow_dispatch: # Questo è il tuo pulsante di emergenza manuale

jobs:
  sniper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Sniper
        env:
          VECHAIN_PRIVATE_KEY: ${{ secrets.VECHAIN_PRIVATE_KEY }}
        run: python bot.py
