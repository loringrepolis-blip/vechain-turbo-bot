name: Esegui VeChain Bot
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4 # Aggiornato a v4

      - name: Installa Python
        uses: actions/setup-python@v5 # Aggiornato a v5
        with:
          python-version: '3.10'

      - name: Installa le dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install web3

      - name: Esegui il Bot
        run: python bot.py
