name: Relayer Autovote Hunter

on:
  schedule:
    - cron: '45 6 * * 1'
  workflow_dispatch:

jobs:
  run-relayer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa le dipendenze
        run: pip install -r requirements.txt

      - name: Avvio Caccia allo Snapshot
        env:
          VECHAIN_PRIVATE_KEY: ${{ secrets.VECHAIN_PRIVATE_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python -u bot.py
