name: Esegui VeChain Bot

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Installa le dipendenze
        run: pip install requests eth-account
      - name: Esegui il Bot
        run: python bot.py
