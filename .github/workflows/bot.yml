name: Relayer Autovote Hunter

on:
  schedule:
    - cron: '0 7 * * 1'  # Lunedì ore 08:00 italiane (07:00 UTC)
  workflow_dispatch:      # Ti permette di avviarlo ora per test o domani a mano

jobs:
  run-relayer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa le dipendenze
        run: pip install web3 eth-account requests

      - name: Avvio Caccia allo Snapshot
        env:
          VECHAIN_PRIVATE_KEY: ${{ secrets.VECHAIN_PRIVATE_KEY }}
        run: python bot.py
