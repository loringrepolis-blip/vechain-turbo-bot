name: Esegui VeChain Bot
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v3

      - name: Installa Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installa le dipendenze
        run: |
          pip install web3
          # Aggiungi qui eventuali altre librerie che ti servono

      - name: Esegui il Bot
        run: python bot.py
